---
apiVersion: v1
kind: Service
metadata:
  name: flightsim-mcp
  namespace: flightsim-mcp
spec:
  selector:
    app: flightsim-mcp
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flightsim-mcp
  namespace: flightsim-mcp
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`flightsim-mcp.moria-lab.com`)
      kind: Rule
      services:
        - name: flightsim-mcp
          port: 8080
  tls: {}
