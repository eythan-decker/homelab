---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flightsim-mcp
  namespace: flightsim-mcp
spec:
  selector:
    matchLabels:
      app: flightsim-mcp
  replicas: 1
  template:
    metadata:
      labels:
        app: flightsim-mcp
    spec:
      containers:
        - name: flightsim-mcp
          image: ghcr.io/eythan-decker/flightsim-mcp:latest
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HTTP_ADDR
              value: ":8080"
            - name: SIMCONNECT_HOST
              value: "192.168.0.44"
            - name: SIMCONNECT_PORT
              value: "4500"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
